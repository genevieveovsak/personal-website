<!-- Social preview card — export this to og-image.png (1200×630) for full platform support.
     LinkedIn, Twitter/X, and Facebook require PNG/JPEG; SVG is used as the source template. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d45f82"/>
      <stop offset="60%" stop-color="#9b3d61"/>
      <stop offset="100%" stop-color="#6e2445"/>
    </linearGradient>
    <linearGradient id="grad-h" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a0bc8a"/>
      <stop offset="100%" stop-color="#d45f82"/>
    </linearGradient>
    <radialGradient id="orb1" cx="15%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#9b3d61" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#9b3d61" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="85%" cy="45%" r="45%">
      <stop offset="0%" stop-color="#d45f82" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#d45f82" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#1a0f14"/>

  <!-- Ambient orbs -->
  <ellipse cx="180" cy="315" rx="480" ry="380" fill="url(#orb1)"/>
  <ellipse cx="1020" cy="300" rx="400" ry="320" fill="url(#orb2)"/>

  <!-- Top accent bar -->
  <rect width="1200" height="3" fill="url(#grad)"/>

  <!-- Logo mark -->
  <rect x="80" y="68" width="54" height="54" rx="13" fill="url(#grad)"/>
  <text x="107" y="106" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
        font-size="22" fill="white" font-weight="700">GO</text>

  <!-- Name -->
  <text x="80" y="275" font-family="Georgia, 'Times New Roman', serif"
        font-size="88" fill="#f7f0f3" font-weight="700" letter-spacing="-2">Genevieve</text>
  <text x="80" y="375" font-family="Georgia, 'Times New Roman', serif"
        font-size="88" font-weight="700" letter-spacing="-2">
    <tspan fill="#d45f82">Ovsak</tspan>
  </text>

  <!-- Rule + tagline row -->
  <rect x="80" y="408" width="48" height="1.5" fill="#a0bc8a" opacity="0.6"/>
  <text x="142" y="421" font-family="Georgia, serif" font-size="17" fill="#a0bc8a"
        font-weight="700" letter-spacing="5">SYSTEMS THINKER</text>
  <rect x="460" y="408" width="48" height="1.5" fill="#a0bc8a" opacity="0.6"/>

  <!-- Sub-tagline -->
  <text x="80" y="468" font-family="-apple-system, system-ui, 'Segoe UI', sans-serif"
        font-size="22" fill="#dfc8d2" font-weight="400">Product · Design · AI · Biology</text>

  <!-- Role -->
  <text x="80" y="510" font-family="-apple-system, system-ui, 'Segoe UI', sans-serif"
        font-size="17" fill="#8a5c6e" font-weight="500">
    Acting Product Owner &amp; Lead Product Designer · UnitedHealth Group / Optum
  </text>

  <!-- URL -->
  <text x="80" y="572" font-family="-apple-system, system-ui, 'Segoe UI', sans-serif"
        font-size="16" fill="#4a2a3a" font-weight="500">genevieveovsak.com</text>

  <!-- Bottom accent bar -->
  <rect y="627" width="1200" height="3" fill="url(#grad)"/>
</svg>
